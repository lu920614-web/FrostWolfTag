<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霜狼鬼抓人 - 阿茲莫丹降臨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212; 
            color: #ecf0f1;
            margin: 0;
            padding-top: 20px;
            min-height: 100vh;
        }

        /* === 頂部控制台 (HUD) === */
        .header-hud {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .title-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            margin: 0 0 15px 0; 
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: #f1c40f; 
            text-align: center;
        }

        /* === 頭像 UI 設置 === */
        .portrait-ui {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background-size: 400% 200%; 
            background-repeat: no-repeat;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            border: 3px solid rgba(255,255,255,0.1);
            transition: background-position 0.2s, border-color 0.3s;
            flex-shrink: 0; 
        }
        .portrait-ui::after {
            content: attr(data-name);
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }

        #portrait-frostwolf {
            background-image: url('01.png');
            border-color: #f1c40f; 
        }
        #portrait-frostwolf::after { color: #f1c40f; }

        #portrait-asmodan {
            background-image: url('03.png');
            border-color: #3498db; 
        }
        #portrait-asmodan::after { color: #3498db; }

        /* 頭像表情定位 */
        .emote-smile { background-position: 0% 0%; }         
        .emote-serious { background-position: 33.33% 0%; }   
        .emote-cry { background-position: 66.66% 0%; }       
        .emote-angry { background-position: 100% 0%; }       
        .emote-wolf { background-position: 0% 100%; }        
        .emote-pout { background-position: 0% 100%; }        
        .emote-laugh { background-position: 33.33% 100%; }   
        .emote-talk { background-position: 66.66% 100%; }    
        .emote-closed { background-position: 100% 100%; }    
        
        /* === UI 按鈕設定 === */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls button {
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            color: #95a5a6;
            background-color: #2c3e50;
            border: 2px solid #1a252f;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .controls button:hover { color: #fff; filter: brightness(1.2); }
        .controls button.active {
            color: #fff;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
            background-color: #34495e;
        }

        @media (max-width: 600px) {
            .header-hud { gap: 10px; }
            .portrait-ui { width: 75px; height: 75px; } 
            h1 { font-size: 24px; }
        }
        
        /* === 遊戲盤面設定 === */
        #board {
            display: grid;
            grid-gap: 4px;
            background-color: #111;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: background-color 0.5s;
            margin-bottom: 20px;
        }

        .cell {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
            overflow: hidden; 
        }

        /* =========================================
           [終極修復] 3x5 精靈圖層對應設置
           ========================================= */
        .character-sprite {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 這裡修改為 500% 高度，因為你的圖有 5 排！ */
            background-size: 300% 500%; 
            background-repeat: no-repeat;
            pointer-events: none; 
            z-index: 10;
            image-rendering: pixelated; /* 讓像素圖保持邊緣銳利 */
        }

        .sprite-frostwolf { background-image: url('02.png'); }
        .sprite-asmodan { background-image: url('04.png'); }

        /* Y軸定位 (總高度為 100%，除以 4 個間隔 = 0, 25, 50, 75, 100) */
        /* 第一列：往下 | 第二列：往左 | 第三列：往右 | 第四列：往上 */
        .face-down { background-position: 50% 0%; }
        .face-left { background-position: 50% 25%; }
        .face-right { background-position: 50% 50%; }
        .face-up { background-position: 50% 75%; }

        /* 動畫劇本更新 Y 軸百分比 */
        @keyframes walk-down { 
            0% { background-position: 50% 0%; } 
            25% { background-position: 0% 0%; } 
            50% { background-position: 50% 0%; } 
            75% { background-position: 100% 0%; } 
            100% { background-position: 50% 0%; } 
        }
        @keyframes walk-left { 
            0% { background-position: 50% 25%; } 
            25% { background-position: 0% 25%; } 
            50% { background-position: 50% 25%; } 
            75% { background-position: 100% 25%; } 
            100% { background-position: 50% 25%; } 
        }
        @keyframes walk-right { 
            0% { background-position: 50% 50%; } 
            25% { background-position: 0% 50%; } 
            50% { background-position: 50% 50%; } 
            75% { background-position: 100% 50%; } 
            100% { background-position: 50% 50%; } 
        }
        @keyframes walk-up { 
            0% { background-position: 50% 75%; } 
            25% { background-position: 0% 75%; } 
            50% { background-position: 50% 75%; } 
            75% { background-position: 100% 75%; } 
            100% { background-position: 50% 75%; } 
        }

        .walking.face-down { animation: walk-down 0.6s infinite step-end; }
        .walking.face-left { animation: walk-left 0.6s infinite step-end; }
        .walking.face-right { animation: walk-right 0.6s infinite step-end; }
        .walking.face-up { animation: walk-up 0.6s infinite step-end; }

        /* 碰裝爆炸圖示 */
        .collision-emoji {
            font-size: 40px;
            color: #fff;
            z-index: 20;
            position: relative;
        }

        /* === 主題材質設置 === */
        /* 1：酒館 */
        .cell.floor-tavern {
            background-color: #9c5b2b;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' fill='%23a6683c'/><rect y='20' width='80' height='20' fill='%2391562e'/><rect y='60' width='80' height='20' fill='%23804a26'/><path d='M0 20h80M0 40h80M0 60h80' stroke='%23573016' stroke-width='2'/></svg>");
        }
        .cell.floor-tavern.obstacle {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><rect x='3' y='2' width='6' height='8' fill='%23b06221'/><rect x='2' y='3' width='8' height='6' fill='%23b06221'/><rect x='3' y='2' width='4' height='1' fill='%23d99c68'/><rect x='2' y='3' width='1' height='3' fill='%23d99c68'/><rect x='6' y='9' width='3' height='1' fill='%23522b11'/><rect x='9' y='5' width='1' height='4' fill='%23522b11'/><rect x='2' y='3' width='8' height='1' fill='%23000'/><rect x='2' y='8' width='8' height='1' fill='%23000'/><rect x='5' y='2' width='1' height='8' fill='%233d210d'/><rect x='8' y='2' width='1' height='8' fill='%233d210d'/></svg>"), 
                              url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' fill='%23a6683c'/><rect y='20' width='80' height='20' fill='%2391562e'/><rect y='60' width='80' height='20' fill='%23804a26'/><path d='M0 20h80M0 40h80M0 60h80' stroke='%23573016' stroke-width='2'/></svg>");
            background-size: 65%, auto; 
            background-position: center;
            background-repeat: no-repeat, repeat; 
        }

        /* 2：暴風城 */
        .cell.floor-stormwind {
            background-color: #1a252c;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%231a252c'/><rect x='2' y='2' width='16' height='16' rx='4' fill='%2334495e'/><rect x='20' y='4' width='16' height='12' rx='4' fill='%232c3e50'/><rect x='4' y='20' width='18' height='16' rx='4' fill='%233b5368'/><rect x='24' y='18' width='14' height='18' rx='5' fill='%232c3e50'/></svg>");
        }
        .cell.floor-stormwind.obstacle {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><rect x='2' y='1' width='4' height='1' fill='%23777'/><rect x='1' y='2' width='6' height='4' fill='%23777'/><rect x='2' y='6' width='4' height='1' fill='%23777'/><rect x='2' y='2' width='2' height='1' fill='%23aaa'/><rect x='1' y='3' width='1' height='1' fill='%23aaa'/><rect x='5' y='4' width='2' height='2' fill='%23444'/><rect x='3' y='5' width='2' height='1' fill='%23444'/></svg>"), 
                              url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%231a252c'/><rect x='2' y='2' width='16' height='16' rx='4' fill='%2334495e'/><rect x='20' y='4' width='16' height='12' rx='4' fill='%232c3e50'/><rect x='4' y='20' width='18' height='16' rx='4' fill='%233b5368'/><rect x='24' y='18' width='14' height='18' rx='5' fill='%232c3e50'/></svg>");
            background-size: 65%, auto;
            background-position: center;
            background-repeat: no-repeat, repeat;
        }

        /* 3：北裂境 */
        .cell.floor-northrend {
            background-color: #ecf0f1;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%23ecf0f1'/><rect x='8' y='12' width='3' height='2' fill='%23bdc3c7'/><rect x='25' y='6' width='4' height='3' fill='%23d5dbdb'/><rect x='5' y='28' width='5' height='2' fill='%23bdc3c7'/><rect x='28' y='25' width='3' height='3' fill='%23d5dbdb'/><rect x='18' y='32' width='2' height='2' fill='%23bdc3c7'/></svg>");
            box-shadow: inset 0 0 12px rgba(189, 195, 199, 0.5);
        }
        .cell.floor-northrend.obstacle {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='7' y='6' width='2' height='9' fill='%233e2723'/><rect x='5' y='14' width='2' height='1' fill='%233e2723'/><rect x='9' y='13' width='2' height='2' fill='%233e2723'/><rect x='5' y='6' width='2' height='2' fill='%233e2723'/><rect x='3' y='4' width='2' height='2' fill='%233e2723'/><rect x='9' y='5' width='2' height='2' fill='%233e2723'/><rect x='11' y='3' width='2' height='2' fill='%233e2723'/><rect x='7' y='2' width='2' height='4' fill='%233e2723'/><rect x='5' y='1' width='2' height='2' fill='%233e2723'/></svg>"), 
                              url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%23ecf0f1'/><rect x='8' y='12' width='3' height='2' fill='%23bdc3c7'/><rect x='25' y='6' width='4' height='3' fill='%23d5dbdb'/><rect x='5' y='28' width='5' height='2' fill='%23bdc3c7'/><rect x='28' y='25' width='3' height='3' fill='%23d5dbdb'/><rect x='18' y='32' width='2' height='2' fill='%23bdc3c7'/></svg>");
            background-size: 75%, auto;
            background-position: center bottom, center;
            background-repeat: no-repeat, repeat;
        }

        /* 綠色邊框移動提示 */
        .highlight {
            cursor: pointer;
            box-shadow: inset 0 0 0 5px #2ecc71, inset 0 0 15px rgba(46, 204, 113, 0.3) !important;
            z-index: 20;
        }
        .highlight:hover {
            box-shadow: inset 0 0 0 6px #2ecc71, inset 0 0 25px rgba(46, 204, 113, 0.5) !important;
            transform: scale(0.95);
        }
        
        #msg {
            font-size: 20px;
            font-weight: bold;
            height: 30px;
            color: #f39c12;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-hud">
        <div id="portrait-frostwolf" class="portrait-ui" data-name="霜狼"></div>
        <div class="title-area">
            <h1>霜狼鬼抓人</h1>
            <div class="controls">
                <button id="btn-tavern" onclick="initGame(4, 3, 0.15, 'tavern')">鮑伯的酒館</button>
                <button id="btn-stormwind" onclick="initGame(4, 4, 0.20, 'stormwind')">暴風城黑夜</button>
                <button id="btn-northrend" onclick="initGame(5, 4, 0.25, 'northrend')">前往北裂境</button>
            </div>
        </div>
        <div id="portrait-asmodan" class="portrait-ui" data-name="阿茲莫丹"></div>
    </div>

    <div id="board"></div>
    <div id="msg">載入中...</div>

    <script>
        const boardElement = document.getElementById('board');
        const msgElement = document.getElementById('msg');
        
        const uiFrostwolf = document.getElementById('portrait-frostwolf');
        const uiAsmodan = document.getElementById('portrait-asmodan');
        
        let cols, rows, rockDensity, currentTheme;
        let playerPos, aiPos, rocks, gameOver;
        
        let playerFaceDir = 'face-down';
        let aiFaceDir = 'face-down';

        function initGame(c, r, density, theme) {
            cols = c;
            rows = r;
            rockDensity = density;
            currentTheme = theme;
            playerPos = { r: 0, c: 0 };
            aiPos = { r: rows - 1, c: cols - 1 };
            gameOver = false;
            
            playerFaceDir = 'face-down';
            aiFaceDir = 'face-down';
            
            updatePortraitEmote('frostwolf', 'emote-smile');
            updatePortraitEmote('asmodan', 'emote-serious');
            
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + theme).classList.add('active');
            
            boardElement.style.gridTemplateColumns = `repeat(${cols}, 80px)`;

            generateMap();
            
            if (theme === 'tavern') {
                msgElement.innerText = "酒館裡，霜狼哈士奇咬著尾巴出現了！";
                msgElement.style.color = "#f39c12"; 
                updatePortraitEmote('asmodan', 'emote-pout');
            } else if (theme === 'stormwind') {
                msgElement.innerText = "黑夜暗巷，貓咪法師阿茲莫丹哼了一聲...";
                msgElement.style.color = "#3498db"; 
                updatePortraitEmote('asmodan', 'emote-angry');
            } else if (theme === 'northrend') {
                msgElement.innerText = "冰天雪地，霜狼興奮狼嚎，貓咪則瑟瑟發抖...";
                msgElement.style.color = "#ecf0f1"; 
                updatePortraitEmote('asmodan', 'emote-cry');
                updatePortraitEmote('frostwolf', 'emote-talk');
            }
            
            drawBoard();
        }

        function updatePortraitEmote(char, emoteClass) {
            const el = char === 'frostwolf' ? uiFrostwolf : uiAsmodan;
            el.className = el.className.replace(/\bemote-\S+/g, '');
            el.classList.add(emoteClass);
        }

        function generateMap() {
            let connected = false;
            let numRocks = Math.floor(cols * rows * rockDensity);
            while (!connected) {
                rocks = [];
                while (rocks.length < numRocks) {
                    let r = Math.floor(Math.random() * rows);
                    let c = Math.floor(Math.random() * cols);
                    if ((r === 0 && c === 0) || (r === rows - 1 && c === cols - 1)) continue;
                    if (!rocks.some(rock => rock.r === r && rock.c === c)) rocks.push({ r, c });
                }
                connected = checkConnection();
            }
        }

        function checkConnection() {
            let queue = [{ r: 0, c: 0 }];
            let visited = new Set(['0,0']);
            let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            while (queue.length > 0) {
                let curr = queue.shift();
                if (curr.r === rows - 1 && curr.c === cols - 1) return true;
                for (let d of dirs) {
                    let nr = curr.r + d[0], nc = curr.c + d[1];
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !isRock(nr, nc)) {
                        let key = `${nr},${nc}`;
                        if (!visited.has(key)) { visited.add(key); queue.push({ r: nr, c: nc }); }
                    }
                }
            }
            return false;
        }

        function isRock(r, c) { return rocks.some(rock => rock.r === r && rock.c === c); }

        function getValidMoves(pos) {
            let moves = [];
            let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            for (let d of dirs) {
                let nr = pos.r + d[0], nc = pos.c + d[1];
                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !isRock(nr, nc)) moves.push({ r: nr, c: nc });
            }
            return moves;
        }

        function getDirectionClass(dr, dc) {
            if (dr > 0) return 'face-down'; 
            if (dr < 0) return 'face-up';   
            if (dc > 0) return 'face-right';
            if (dc < 0) return 'face-left'; 
            return 'face-down'; 
        }

        function drawBoard() {
            boardElement.innerHTML = '';
            let validPlayerMoves = gameOver ? [] : getValidMoves(playerPos);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let cell = document.createElement('div');
                    cell.classList.add('cell', `floor-${currentTheme}`);

                    let hasPlayer = (playerPos.r === r && playerPos.c === c);
                    let hasAI = (aiPos.r === r && aiPos.c === c);
                    let hasRock = isRock(r, c);

                    let contentHtml = '';

                    if (hasRock) {
                        cell.classList.add('obstacle');
                    } else if (hasPlayer && hasAI) {
                        contentHtml = '<div class="collision-emoji">💥</div>';
                    } else if (hasPlayer) {
                        contentHtml = `<div class="character-sprite sprite-frostwolf ${playerFaceDir} walking"></div>`;
                    } else if (hasAI) {
                        contentHtml = `<div class="character-sprite sprite-asmodan ${aiFaceDir} walking"></div>`;
                    }

                    cell.innerHTML = contentHtml;

                    if (!gameOver && !hasPlayer && !hasRock) {
                        let isMovable = validPlayerMoves.some(m => m.r === r && m.c === c);
                        if (isMovable) {
                            cell.classList.add('highlight');
                            cell.onclick = () => playerTurn(r, c);
                        }
                    }
                    boardElement.appendChild(cell);
                }
            }
        }

        function playerTurn(r, c) {
            if (gameOver) return;
            
            let dr = r - playerPos.r;
            let dc = c - playerPos.c;
            playerFaceDir = getDirectionClass(dr, dc);
            
            playerPos = { r: r, c: c };
            
            if (playerPos.r === aiPos.r && playerPos.c === aiPos.c) {
                updatePortraitEmote('frostwolf', 'emote-wolf');
                updatePortraitEmote('asmodan', 'emote-serious'); 
                endGame("抓到了！哈士奇的勝利！🎉", "#2ecc71");
                return;
            }
            
            if (currentTheme !== 'northrend') updatePortraitEmote('asmodan', 'emote-pout');

            drawBoard(); 
            setTimeout(aiTurn, 250); 
        }

        function aiTurn() {
            if (gameOver) return;
            let validMoves = getValidMoves(aiPos);
            
            if (validMoves.length === 0) {
                updatePortraitEmote('asmodan', 'emote-serious'); 
                updatePortraitEmote('frostwolf', 'emote-wolf');
                endGame("獵物被包圍，傲嬌貓不甘心！😎", "#2ecc71");
                return;
            }
            
            let maxDist = -1, bestMoves = [];
            validMoves.forEach(move => {
                let dist = Math.abs(move.r - playerPos.r) + Math.abs(move.c - playerPos.c);
                if (dist > maxDist) { maxDist = dist; bestMoves = [move]; }
                else if (dist === maxDist) { bestMoves.push(move); }
            });
            
            let chosenMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            
            let dr = chosenMove.r - aiPos.r;
            let dc = chosenMove.c - aiPos.c;
            aiFaceDir = getDirectionClass(dr, dc);
            
            aiPos = chosenMove;
            
            if (aiPos.r === playerPos.r && aiPos.c === playerPos.c) {
                updatePortraitEmote('asmodan', 'emote-serious'); 
                updatePortraitEmote('frostwolf', 'emote-wolf');
                endGame("獵物自投羅網！哈士奇大勝！😎", "#2ecc71");
            } else {
                if (currentTheme === 'tavern') msgElement.innerText = "霜狼舔舔嘴巴...（你的回合）";
                else if (currentTheme === 'stormwind') msgElement.innerText = "阿茲莫丹飛快逃竄...（你的回合）";
                else if (currentTheme === 'northrend') {
                    msgElement.innerText = "呼呼... 好冷...（你的回合）";
                    updatePortraitEmote('asmodan', 'emote-cry'); 
                }
                drawBoard();
            }
        }

        function endGame(msg, color) {
            gameOver = true;
            msgElement.innerText = msg;
            msgElement.style.color = color;
            drawBoard();
        }

        initGame(4, 3, 0.15, 'tavern');
    </script>
</body>
</html>
