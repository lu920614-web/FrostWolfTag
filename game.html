<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霜狼鬼抓人</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #080808; 
            color: #ecf0f1;
            margin: 0;
            padding-top: 15px;
            min-height: 100vh;
        }

        /* === 頂部控制台 (HUD) === */
        .header-hud {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
        }

        .title-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            margin: 0 0 10px 0; 
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: #f1c40f; 
            text-align: center;
        }

        /* === 頭像 UI 與 SVG 項圈設置 === */
        .portrait-ui {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 12px;
            background-size: 400% 200%; 
            background-repeat: no-repeat;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transition: background-position 0.2s;
            flex-shrink: 0; 
        }

        /* 利用虛擬圖層 (::before) 疊加上 SVG 項圈邊框 */
        .portrait-ui::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            pointer-events: none; /* 讓點擊可以穿透 */
            z-index: 5;
            background-size: 100% 100%;
        }

        /* 名牌 UI (::after) */
        .portrait-ui::after {
            content: attr(data-name);
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9); /* 增強對比度 */
        }

        /* 🐺 霜狼：厚實灰銀狗狗項圈 (SVG) 與 灰色系名牌 */
        #portrait-frostwolf { background-image: url('01.png'); }
        #portrait-frostwolf::before {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='3' y='3' width='94' height='94' rx='12' fill='none' stroke='%23556061' stroke-width='6'/><rect x='6' y='6' width='88' height='88' rx='9' fill='none' stroke='%232a2e2f' stroke-width='2'/><circle cx='10' cy='25' r='2' fill='%23bdc3c7'/><circle cx='10' cy='50' r='2' fill='%23bdc3c7'/><circle cx='10' cy='75' r='2' fill='%23bdc3c7'/><circle cx='90' cy='25' r='2' fill='%23bdc3c7'/><circle cx='90' cy='50' r='2' fill='%23bdc3c7'/><circle cx='90' cy='75' r='2' fill='%23bdc3c7'/><rect x='40' y='92' width='20' height='8' rx='2' fill='%2395a5a6'/><rect x='46' y='94' width='8' height='4' fill='%232c3e50'/></svg>");
        }
        #portrait-frostwolf::after { 
            background: #2c3e50; /* 深灰藍底 */
            color: #ecf0f1;      /* 亮銀白字 */
            border: 2px solid #556061; 
        }

        /* 👾 阿茲莫丹：魔法褐色鈴鐺項圈 (SVG) 與 褐色系名牌 */
        #portrait-asmodan { background-image: url('03.png'); }
        #portrait-asmodan::before {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='3' y='3' width='94' height='94' rx='12' fill='none' stroke='%235c3a21' stroke-width='6'/><rect x='3' y='3' width='94' height='94' rx='12' fill='none' stroke='%23d35400' stroke-width='1.5' stroke-dasharray='4 4'/><circle cx='50' cy='95' r='8' fill='%23f1c40f'/><circle cx='50' cy='96' r='2' fill='%238e44ad'/><line x1='47' y1='100' x2='53' y2='100' stroke='%238b4513' stroke-width='1'/></svg>");
        }
        #portrait-asmodan::after { 
            background: #4a2311; /* 深褐皮底 */
            color: #f39c12;      /* 亮金黃字 */
            border: 2px solid #8b4513; 
        }

        .emote-smile { background-position: 0% 0%; }         
        .emote-serious { background-position: 33.33% 0%; }   
        .emote-cry { background-position: 66.66% 0%; }       
        .emote-angry { background-position: 100% 0%; }       
        .emote-wolf { background-position: 0% 100%; }        
        .emote-pout { background-position: 0% 100%; }        
        .emote-laugh { background-position: 33.33% 100%; }   
        .emote-talk { background-position: 66.66% 100%; }    
        .emote-closed { background-position: 100% 100%; }    
        
        /* === UI 按鈕設定與解鎖狀態 === */
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls button {
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            color: #95a5a6;
            background-color: #1a252f;
            border: 2px solid #080808;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .controls button:hover:not(:disabled) { color: #fff; filter: brightness(1.2); }
        .controls button.active {
            color: #fff;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
            background-color: #2c3e50;
        }
        /* 反灰未解鎖按鈕 */
        .controls button:disabled {
            background-color: #111;
            color: #444;
            border: 2px solid #222;
            cursor: not-allowed;
            box-shadow: none;
        }

        @media (max-width: 600px) {
            .header-hud { gap: 8px; flex-direction: column; }
            .portrait-ui { width: 70px; height: 70px; } 
            h1 { font-size: 24px; }
            .controls button { font-size: 13px; padding: 5px 10px; }
        }
        
        /* === 遊戲盤面設定 === */
        #board {
            display: grid;
            grid-gap: 3px; 
            background-color: #000;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            margin-bottom: 15px;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .cell {
            width: 70px; 
            height: 70px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden; 
            transition: filter 0.3s, background-color 0.3s;
        }

        .character-sprite {
            position: absolute;
            width: 90%;
            height: 90%;
            background-size: 756px 504px; 
            background-repeat: no-repeat;
            pointer-events: none; 
            z-index: 10;
            image-rendering: pixelated; 
            background-position-x: -63px; 
            left: 50%;
            transform: translateX(-50%);
        }

        .sprite-frostwolf { background-image: url('02.png'); }
        .sprite-asmodan { background-image: url('04.png'); }

        .face-down  { background-position-y: 0px; }
        .face-left  { background-position-y: -63px; }
        .face-right { background-position-y: -126px; }
        .face-up    { background-position-y: -189px; }

        @keyframes walk-cycle {
            0%   { background-position-x: -63px; } 
            25%  { background-position-x: 0px; }   
            50%  { background-position-x: -63px; } 
            75%  { background-position-x: -126px; } 
            100% { background-position-x: -63px; } 
        }

        .walking { animation: walk-cycle 0.6s infinite step-end; }

        /* === 戰爭迷霧 (Fog of War) 系統 === */
        .cell.unexplored {
            background-color: #000 !important;
            background-image: none !important;
        }
        .cell.unexplored * { display: none !important; }

        .cell.explored {
            filter: brightness(0.45) contrast(1.1); 
        }
        .cell.explored .sprite-asmodan,
        .cell.explored .collision-emoji { display: none !important; }
        .cell.explored .sprite-frostwolf { display: block !important; }

        .cell.visible { filter: brightness(1) contrast(1); }

        .collision-emoji {
            font-size: 35px;
            color: #fff;
            z-index: 20;
            position: relative;
        }

        /* === 主題材質設置 === */
        .cell.floor-tavern {
            background-color: #9c5b2b;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' fill='%23a6683c'/><rect y='20' width='80' height='20' fill='%2391562e'/><rect y='60' width='80' height='20' fill='%23804a26'/><path d='M0 20h80M0 40h80M0 60h80' stroke='%23573016' stroke-width='2'/></svg>");
        }
        .cell.floor-tavern.obstacle {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><rect x='3' y='2' width='6' height='8' fill='%23b06221'/><rect x='2' y='3' width='8' height='6' fill='%23b06221'/><rect x='3' y='2' width='4' height='1' fill='%23d99c68'/><rect x='2' y='3' width='1' height='3' fill='%23d99c68'/><rect x='6' y='9' width='3' height='1' fill='%23522b11'/><rect x='9' y='5' width='1' height='4' fill='%23522b11'/><rect x='2' y='3' width='8' height='1' fill='%23000'/><rect x='2' y='8' width='8' height='1' fill='%23000'/><rect x='5' y='2' width='1' height='8' fill='%233d210d'/><rect x='8' y='2' width='1' height='8' fill='%233d210d'/></svg>"), 
                              url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' fill='%23a6683c'/><rect y='20' width='80' height='20' fill='%2391562e'/><rect y='60' width='80' height='20' fill='%23804a26'/><path d='M0 20h80M0 40h80M0 60h80' stroke='%23573016' stroke-width='2'/></svg>");
            background-size: 60%, auto; 
            background-position: center;
            background-repeat: no-repeat, repeat; 
        }

        .cell.floor-stormwind {
            background-color: #1a252c;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%231a252c'/><rect x='2' y='2' width='16' height='16' rx='4' fill='%2334495e'/><rect x='20' y='4' width='16' height='12' rx='4' fill='%232c3e50'/><rect x='4' y='20' width='18' height='16' rx='4' fill='%233b5368'/><rect x='24' y='18' width='14' height='18' rx='5' fill='%232c3e50'/></svg>");
        }
        .cell.floor-stormwind.obstacle {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><rect x='2' y='1' width='4' height='1' fill='%23777'/><rect x='1' y='2' width='6' height='4' fill='%23777'/><rect x='2' y='6' width='4' height='1' fill='%23777'/><rect x='2' y='2' width='2' height='1' fill='%23aaa'/><rect x='1' y='3' width='1' height='1' fill='%23aaa'/><rect x='5' y='4' width='2' height='2' fill='%23444'/><rect x='3' y='5' width='2' height='1' fill='%23444'/></svg>"), 
                              url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%231a252c'/><rect x='2' y='2' width='16' height='16' rx='4' fill='%2334495e'/><rect x='20' y='4' width='16' height='12' rx='4' fill='%232c3e50'/><rect x='4' y='20' width='18' height='16' rx='4' fill='%233b5368'/><rect x='24' y='18' width='14' height='18' rx='5' fill='%232c3e50'/></svg>");
            background-size: 65%, auto;
            background-position: center;
            background-repeat: no-repeat, repeat;
        }

        .cell.floor-northrend {
            background-color: #ecf0f1;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%23ecf0f1'/><rect x='8' y='12' width='3' height='2' fill='%23bdc3c7'/><rect x='25' y='6' width='4' height='3' fill='%23d5dbdb'/><rect x='5' y='28' width='5' height='2' fill='%23bdc3c7'/><rect x='28' y='25' width='3' height='3' fill='%23d5dbdb'/><rect x='18' y='32' width='2' height='2' fill='%23bdc3c7'/></svg>");
            box-shadow: inset 0 0 12px rgba(189, 195, 199, 0.5);
        }
        .cell.floor-northrend.obstacle {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='7' y='6' width='2' height='9' fill='%233e2723'/><rect x='5' y='14' width='2' height='1' fill='%233e2723'/><rect x='9' y='13' width='2' height='2' fill='%233e2723'/><rect x='5' y='6' width='2' height='2' fill='%233e2723'/><rect x='3' y='4' width='2' height='2' fill='%233e2723'/><rect x='9' y='5' width='2' height='2' fill='%233e2723'/><rect x='11' y='3' width='2' height='2' fill='%233e2723'/><rect x='7' y='2' width='2' height='4' fill='%233e2723'/><rect x='5' y='1' width='2' height='2' fill='%233e2723'/></svg>"), 
                              url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' fill='%23ecf0f1'/><rect x='8' y='12' width='3' height='2' fill='%23bdc3c7'/><rect x='25' y='6' width='4' height='3' fill='%23d5dbdb'/><rect x='5' y='28' width='5' height='2' fill='%23bdc3c7'/><rect x='28' y='25' width='3' height='3' fill='%23d5dbdb'/><rect x='18' y='32' width='2' height='2' fill='%23bdc3c7'/></svg>");
            background-size: 75%, auto;
            background-position: center bottom, center;
            background-repeat: no-repeat, repeat;
        }

        .highlight {
            cursor: pointer;
            box-shadow: inset 0 0 0 5px #2ecc71, inset 0 0 20px rgba(46, 204, 113, 0.4) !important;
            z-index: 20;
        }
        .highlight:hover {
            box-shadow: inset 0 0 0 6px #2ecc71, inset 0 0 30px rgba(46, 204, 113, 0.6) !important;
            transform: scale(0.95);
        }
        
        #msg {
            font-size: 19px;
            font-weight: bold;
            height: 30px;
            color: #f39c12;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-hud">
        <div id="portrait-frostwolf" class="portrait-ui" data-name="霜狼"></div>
        <div class="title-area">
            <h1>霜狼鬼抓人</h1>
            <div class="controls">
                <button id="btn-tavern" onclick="initGame(5, 4, 0.18, 'tavern')">鮑伯的酒館</button>
                <button id="btn-stormwind" onclick="initGame(6, 5, 0.23, 'stormwind')" disabled>暗夜暴風城</button>
                <button id="btn-northrend" onclick="initGame(8, 7, 0.28, 'northrend')" disabled>前往北裂境</button>
            </div>
        </div>
        <div id="portrait-asmodan" class="portrait-ui" data-name="阿茲莫丹"></div>
    </div>

    <div id="board"></div>
    <div id="msg">載入中...</div>

    <script>
        const boardElement = document.getElementById('board');
        const msgElement = document.getElementById('msg');
        
        const uiFrostwolf = document.getElementById('portrait-frostwolf');
        const uiAsmodan = document.getElementById('portrait-asmodan');
        
        let cols, rows, rockDensity, currentTheme;
        let playerPos, aiPos, rocks, gameOver;
        
        // 紀錄玩家的解鎖進度 (預設 1)
        let unlockedLevel = 1;
        
        let fogOfWarMap = [];
        let playerFaceDir = 'face-down';
        let aiFaceDir = 'face-down';

        function initGame(c, r, density, theme) {
            cols = c;
            rows = r;
            rockDensity = density; 
            currentTheme = theme;
            playerPos = { r: 0, c: 0 };
            aiPos = { r: rows - 1, c: cols - 1 };
            gameOver = false;
            
            playerFaceDir = 'face-down';
            aiFaceDir = 'face-down';
            
            updatePortraitEmote('frostwolf', 'emote-smile');
            updatePortraitEmote('asmodan', 'emote-serious');
            
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + theme).classList.add('active');
            
            boardElement.style.gridTemplateColumns = `repeat(${cols}, 70px)`;

            generateMap();
            
            fogOfWarMap = Array(rows).fill().map(() => Array(cols).fill(0));
            updateFogOfWar();

            if (theme === 'tavern') {
                msgElement.innerText = "酒館熄燈了，霜狼只能靠嗅覺探路...";
                msgElement.style.color = "#f39c12"; 
                updatePortraitEmote('asmodan', 'emote-pout');
            } else if (theme === 'stormwind') {
                msgElement.innerText = "暴風城暗巷，阿茲莫丹的眼睛在黑暗中閃爍...";
                msgElement.style.color = "#3498db"; 
                updatePortraitEmote('asmodan', 'emote-angry');
            } else if (theme === 'northrend') {
                msgElement.innerText = "白茫茫的風暴，除了寒冷，你看不到任何東西...";
                msgElement.style.color = "#ecf0f1"; 
                updatePortraitEmote('asmodan', 'emote-cry');
                updatePortraitEmote('frostwolf', 'emote-talk');
            }
            
            drawBoard();
        }

        function updatePortraitEmote(char, emoteClass) {
            const el = char === 'frostwolf' ? uiFrostwolf : uiAsmodan;
            el.className = el.className.replace(/\bemote-\S+/g, '');
            el.classList.add(emoteClass);
        }

        function generateMap() {
            let connected = false;
            let numRocks = Math.floor(cols * rows * rockDensity);
            while (!connected) {
                rocks = [];
                while (rocks.length < numRocks) {
                    let r = Math.floor(Math.random() * rows);
                    let c = Math.floor(Math.random() * cols);
                    if ((r === 0 && c === 0) || (r === rows - 1 && c === cols - 1)) continue;
                    if (!rocks.some(rock => rock.r === r && rock.c === c)) rocks.push({ r, c });
                }
                connected = checkConnection();
            }
        }

        function checkConnection() {
            let queue = [{ r: 0, c: 0 }];
            let visited = new Set(['0,0']);
            let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            while (queue.length > 0) {
                let curr = queue.shift();
                if (curr.r === rows - 1 && curr.c === cols - 1) return true;
                for (let d of dirs) {
                    let nr = curr.r + d[0], nc = curr.c + d[1];
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !isRock(nr, nc)) {
                        let key = `${nr},${nc}`;
                        if (!visited.has(key)) { visited.add(key); queue.push({ r: nr, c: nc }); }
                    }
                }
            }
            return false;
        }

        function isRock(r, c) { return rocks.some(rock => rock.r === r && rock.c === c); }

        function getValidMoves(pos) {
            let moves = [];
            let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            for (let d of dirs) {
                let nr = pos.r + d[0], nc = pos.c + d[1];
                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !isRock(nr, nc)) moves.push({ r: nr, c: nc });
            }
            return moves;
        }

        function getDirectionClass(dr, dc) {
            if (dr > 0) return 'face-down'; 
            if (dr < 0) return 'face-up';   
            if (dc > 0) return 'face-right';
            if (dc < 0) return 'face-left'; 
            return 'face-down'; 
        }

        function updateFogOfWar() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (fogOfWarMap[r][c] === 2) fogOfWarMap[r][c] = 1;
                }
            }
            const radius = 2;
            for (let dr = -radius; dr <= radius; dr++) {
                for (let dc = -radius; dc <= radius; dc++) {
                    if (Math.abs(dr) + Math.abs(dc) <= radius) {
                        let nr = playerPos.r + dr;
                        let nc = playerPos.c + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            fogOfWarMap[nr][nc] = 2;
                        }
                    }
                }
            }
        }

        function drawBoard() {
            boardElement.innerHTML = '';
            let validPlayerMoves = gameOver ? [] : getValidMoves(playerPos);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let cell = document.createElement('div');
                    cell.classList.add('cell', `floor-${currentTheme}`);

                    const fogState = fogOfWarMap[r][c];
                    if (fogState === 0) cell.classList.add('unexplored');
                    else if (fogState === 1) cell.classList.add('explored');
                    else if (fogState === 2) cell.classList.add('visible');

                    let hasPlayer = (playerPos.r === r && playerPos.c === c);
                    let hasAI = (aiPos.r === r && aiPos.c === c);
                    let hasRock = isRock(r, c);

                    let contentHtml = '';

                    if (hasRock) {
                        cell.classList.add('obstacle');
                    } else if (hasPlayer && hasAI) {
                        contentHtml = '<div class="collision-emoji">💥</div>';
                    } else if (hasPlayer) {
                        contentHtml = `<div class="character-sprite sprite-frostwolf ${playerFaceDir} walking"></div>`;
                    } else if (hasAI && fogState === 2) {
                        contentHtml = `<div class="character-sprite sprite-asmodan ${aiFaceDir} walking"></div>`;
                    }

                    cell.innerHTML = contentHtml;

                    if (!gameOver && !hasPlayer && !hasRock && fogState !== 0) {
                        let isMovable = validPlayerMoves.some(m => m.r === r && m.c === c);
                        if (isMovable) {
                            cell.classList.add('highlight');
                            cell.onclick = () => playerTurn(r, c);
                        }
                    }
                    boardElement.appendChild(cell);
                }
            }
        }

        function playerTurn(r, c) {
            if (gameOver) return;
            
            let dr = r - playerPos.r;
            let dc = c - playerPos.c;
            playerFaceDir = getDirectionClass(dr, dc);
            
            playerPos = { r: r, c: c };
            
            if (playerPos.r === aiPos.r && playerPos.c === aiPos.c) {
                updatePortraitEmote('frostwolf', 'emote-wolf');
                updatePortraitEmote('asmodan', 'emote-serious'); 
                endGame("抓到了！哈士奇的勝利！🎉", "#2ecc71", true);
                return;
            }
            
            updateFogOfWar();
            if (currentTheme !== 'northrend') updatePortraitEmote('asmodan', 'emote-pout');

            drawBoard(); 
            setTimeout(aiTurn, 250); 
        }

        function aiTurn() {
            if (gameOver) return;
            let validMoves = getValidMoves(aiPos);
            
            if (validMoves.length === 0) {
                updatePortraitEmote('asmodan', 'emote-serious'); 
                updatePortraitEmote('frostwolf', 'emote-wolf');
                endGame("獵物被包圍，傲嬌貓不甘心！😎", "#2ecc71", true);
                return;
            }
            
            let distToPlayer = Math.abs(aiPos.r - playerPos.r) + Math.abs(aiPos.c - playerPos.c);
            let bestMoves = [];
            let maxScore = -Infinity;

            if (distToPlayer > 4) {
                validMoves.forEach(move => {
                    let score = 0; 
                    let isEdge = (move.r === 0 || move.r === rows - 1 || move.c === 0 || move.c === cols - 1);
                    let isCorner = (move.r === 0 || move.r === rows - 1) && (move.c === 0 || move.c === cols - 1);

                    if (isCorner) score -= 2;
                    else if (isEdge) score -= 1;

                    if (score > maxScore) { maxScore = score; bestMoves = [move]; }
                    else if (score === maxScore) { bestMoves.push(move); }
                });
            } else {
                validMoves.forEach(move => {
                    let dist = Math.abs(move.r - playerPos.r) + Math.abs(move.c - playerPos.c);
                    let score = dist * 10; 
                    
                    let isEdge = (move.r === 0 || move.r === rows - 1 || move.c === 0 || move.c === cols - 1);
                    let isCorner = (move.r === 0 || move.r === rows - 1) && (move.c === 0 || move.c === cols - 1);

                    if (isCorner) score -= 15; 
                    else if (isEdge) score -= 5;

                    if (score > maxScore) { maxScore = score; bestMoves = [move]; }
                    else if (score === maxScore) { bestMoves.push(move); }
                });
            }
            
            let chosenMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            
            let dr = chosenMove.r - aiPos.r;
            let dc = chosenMove.c - aiPos.c;
            aiFaceDir = getDirectionClass(dr, dc);
            
            aiPos = chosenMove;
            
            if (aiPos.r === playerPos.r && aiPos.c === playerPos.c) {
                updatePortraitEmote('asmodan', 'emote-serious'); 
                updatePortraitEmote('frostwolf', 'emote-wolf');
                endGame("獵物自投羅網！哈士奇大勝！😎", "#2ecc71", true);
            } else {
                if (currentTheme === 'tavern') msgElement.innerText = "黑暗中傳來木桶碰撞聲...（你的回合）";
                else if (currentTheme === 'stormwind') msgElement.innerText = "傲嬌貓飛快逃竄...（你的回合）";
                else if (currentTheme === 'northrend') {
                    msgElement.innerText = "呼呼... 好冷...（你的回合）";
                    updatePortraitEmote('asmodan', 'emote-cry'); 
                }
                drawBoard();
            }
        }

        // [重點] 遊戲結束判定與進度解鎖
        function endGame(msg, color, isWin = false) {
            gameOver = true;
            msgElement.innerText = msg;
            msgElement.style.color = color;
            
            if (isWin) {
                // 如果在酒館獲勝，解鎖暴風城
                if (currentTheme === 'tavern' && unlockedLevel < 2) {
                    unlockedLevel = 2;
                    document.getElementById('btn-stormwind').disabled = false;
                    setTimeout(() => alert("🎉 恭喜！解鎖第二關【暗夜暴風城】！"), 300);
                } 
                // 如果在暴風城獲勝，解鎖北裂境
                else if (currentTheme === 'stormwind' && unlockedLevel < 3) {
                    unlockedLevel = 3;
                    document.getElementById('btn-northrend').disabled = false;
                    setTimeout(() => alert("🎉 恭喜！解鎖最終關卡【前往北裂境】！"), 300);
                }
            }
            
            drawBoard();
        }

        initGame(5, 4, 0.18, 'tavern');
    </script>
